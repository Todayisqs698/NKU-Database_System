{% extends "base.html" %}
{% block title %}赛道管理 - F1{% endblock %}
{% block content %}
<h4 class="border-bottom pb-2 mb-3">赛道管理</h4>
<button class="btn btn-warning btn-sm mb-3" data-bs-toggle="modal" data-bs-target="#trackModal">+ 添加赛道</button>
<table class="table table-hover table-striped">
    <thead class="table-dark"><tr><th>ID</th><th>名称</th><th>城市</th><th>长度(km)</th><th>操作</th></tr></thead>
    <tbody>
    {% for t in tracks %}
    <tr>
        <td>{{ t.track_id }}</td>
        <td>{{ t.track_name }}</td>
        <td>{{ t.track_city }}</td>
        <td>{{ t.track_length }}</td>
        <td>
            <form method="post" action="{{ url_for('admin.delete_track_route', track_id=t.track_id) }}"
                  style="display:inline"
                  onsubmit="return confirm('确认删除赛道「{{ t.track_name }}」？\n如有关联赛事将无法删除。')">
                <button class="btn btn-sm btn-outline-danger">删除</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
<div class="modal fade" id="trackModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <form method="post" action="{{ url_for('admin.add_track') }}">
            <div class="modal-header"><h5>添加赛道</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input class="form-control mb-2" name="name" placeholder="赛道名称" required>
                <input class="form-control mb-2" name="city" placeholder="所在城市" required>
                <input class="form-control mb-2" name="length" placeholder="长度(km)" step="0.001" required>
            </div>
            <div class="modal-footer"><button class="btn btn-primary">添加</button></div>
        </form>
    </div></div>
</div>
{% endblock %}
