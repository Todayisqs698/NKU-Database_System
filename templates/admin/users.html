{% extends "base.html" %}
{% block title %}用户管理 - F1{% endblock %}
{% block content %}
<h4 class="border-bottom pb-2 mb-3">用户列表</h4>
<table class="table table-hover">
    <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>操作</th></tr></thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.user_id }}</td><td>{{ u.user_name }}</td>
            <td><span class="badge bg-{{ 'danger' if u.user_role=='Admin' else 'warning' if u.user_role=='Steward' else 'secondary' }}">{{ u.user_role }}</span></td>
            <td>
                {% if u.user_role != 'Admin' %}
                <form method="post" action="{{ url_for('admin.delete_user_route', user_id=u.user_id) }}" style="display:inline">
                    <button class="btn btn-sm btn-outline-danger" onclick="return confirm('确认删除?')">删除</button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
